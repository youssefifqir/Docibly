# Production Profile Configuration
spring:
  datasource:
    url: jdbc:postgresql://db:5432/Docibly_prod
    username: Docibly_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

  mail:
    # Brevo, not Resend: Resend only sends to your own verified account address until
    # a full domain is verified (DNS records) — a dealbreaker for a demo where anyone
    # can register. Brevo's free tier (300/day, forever) only needs a single verified
    # sender *address* (your own email, no domain) and then sends to any recipient.
    # SMTP_USER is your Brevo account login email; SMTP_PASS is a generated SMTP key
    # (Transactional > Settings > SMTP relay), not your account password.
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.ssl.trust: ${SMTP_HOST:smtp-relay.brevo.com}
logging:
  level:
    root: WARN
    com.docibly.dms: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
